<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Shaqandah E-commerce Application">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Shaqandah">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Shaqandah</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>

<script>
  window.addEventListener('load', function(ev) {
    // تحميل الـ Entrypoint
    _flutter.loader.loadEntrypoint({
      serviceWorker: {
        serviceWorkerVersion: serviceWorkerVersion,
      },
      onEntrypointLoaded: function(engineInitializer) {
        engineInitializer.initializeEngine({
          // ✅ السطر ده هو الأهم لعرض صور Firebase و Network Images
          // ببيجبر Flutter يستخدم الـ HTML Elements لعرض الصور بدل الـ Canvas
          useColorEmoji: true,
          renderer: "html"
        }).then(function(appRunner) {
          appRunner.runApp();
        });
      }
    });
  });
</script>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
